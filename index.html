<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ARC MULTICHAIN AGENT</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.10.0/ethers.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050b18;
color:white;
padding:20px;
}

.container{
max-width:450px;
margin:auto;
}

.card{
background:#0d1628;
padding:22px;
border-radius:20px;
margin-bottom:18px;
border:1px solid #19304a;
}

.title{
font-size:24px;
color:#55a8ff;
}

.label{
margin-top:18px;
color:#8093b0;
}

.value{
margin-top:6px;
font-size:18px;
}

.green{
color:#18ff9d;
}

button{

width:100%;
margin-top:18px;

padding:14px;

border:none;

border-radius:14px;

font-size:16px;

font-weight:bold;

cursor:pointer;

background:
linear-gradient(
90deg,
#18d78b,
#2f90ff
);

}

select{

width:100%;

margin-top:16px;

padding:14px;

background:#07111f;

color:white;

border:none;

border-radius:14px;

}

.history{

background:black;

padding:15px;

border-radius:14px;

height:220px;

overflow:auto;

margin-top:20px;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">

ARC MULTICHAIN AGENT

</div>

</div>



<div class="card">

<h2>Wallet Session</h2>

<div class="label">
Status
</div>

<div
class="value green"
id="status">

Disconnected

</div>


<div class="label">
Wallet
</div>

<div
id="wallet">

—

</div>


<div class="label">
Chain
</div>

<div
id="chain">

—

</div>


<div class="label">
USDC Balance
</div>

<div
class="value green"
id="balance">

—

</div>


<button
onclick="connectWallet()">

Connect MetaMask

</button>


<select
id="network"

onchange="switchChain()">

<option value="1">
Ethereum
</option>

<option value="8453">
Base
</option>

<option value="137">
Polygon
</option>

<option value="42161">
Arbitrum
</option>

</select>

</div>



<div class="card">

<h2>

Transaction History

</h2>

<div
class="history"
id="history">

Waiting for wallet...

</div>

</div>

</div>



<script>

let provider
let signer
let account

const usdc={

1:
"0xA0b86991c6218b36c1d19d4a2e9eb0ce3606eb48",

8453:
"0x833589fCD6EDB6E08f4c7C32D4f71b54bdA02913",

137:
"0x3c499c542cef5e3811e1192ce70d8cc03d5c3359",

42161:
"0xaf88d065e77c8cC2239327C5EDb3A432268e5831"

}

async function connectWallet(){

if(!window.ethereum){

alert(
"Install MetaMask"
)

return

}

provider=
new ethers.BrowserProvider(
window.ethereum
)

await provider.send(
"eth_requestAccounts",
[]
)

signer=
await provider.getSigner()

account=
await signer.getAddress()

document
.getElementById(
"wallet"
)
.innerHTML=
account

document
.getElementById(
"status"
)
.innerHTML=
"Connected"

await loadData()

}



async function loadData(){

const net=
await provider.getNetwork()

const chain=
Number(
net.chainId
)

document
.getElementById(
"chain"
)
.innerHTML=
chain

await loadBalance(
chain
)

await loadHistory()

}



async function loadBalance(chain){

if(!usdc[chain]){

document
.getElementById(
"balance"
)
.innerHTML=
"USDC unavailable"

return

}

const abi=[

"function balanceOf(address) view returns(uint256)"

]

const c=
new ethers.Contract(
usdc[chain],
abi,
provider
)

const b=
await c.balanceOf(
account
)

document
.getElementById(
"balance"
)
.innerHTML=

ethers.formatUnits(
b,
6
)

+" USDC"

}



async function switchChain(){

let id=
document
.getElementById(
"network"
)

.value


try{

await window.ethereum.request({

method:
"wallet_switchEthereumChain",

params:[

{

chainId:
"0x"+
Number(id)
.toString(16)

}

]

})

loadData()

}

catch(e){

alert(
"Network unavailable in MetaMask"
)

}

}



async function loadHistory(){

const tx=
await provider.getBlockNumber()

document
.getElementById(
"history"
)

.innerHTML=

`
Latest Block:
${tx}

<br><br>

Wallet:
${account}

<br><br>

Chain synced.
`

}



window.ethereum?.on(
"accountsChanged",
connectWallet
)

window.ethereum?.on(
"chainChanged",
()=>location.reload()
)

</script>

</body>

</html>
