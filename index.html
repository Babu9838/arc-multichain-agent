<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Multichain AI USDC Agent Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="p-6 border-b border-slate-800 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3 w-full sm:w-auto">
            <!-- বুলেটপ্রুফ ভেক্টর লোগো: এটি কখনোই ফাটবে না বা ঝাপসা হবে না -->
            <div class="h-10 w-10 flex items-center justify-center bg-gradient-to-b from-[#0d1527] to-[#070b14] rounded-xl border border-slate-700/50 p-1.5 flex-shrink-0 shadow-inner">
                <svg viewBox="0 0 100 100" class="w-full h-full" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#ffffff"/>
                            <stop offset="100%" stop-color="#cbd5e1"/>
                        </linearGradient>
                    </defs>
                    <path d="M50 12C32 12 21 38 19 82C27 80 34 76 39 71C39 65 42 62 48 62H71C76 62 79 72 81 83C80 43 68 12 50 12ZM50 25C58 25 66 43 68 53H32C34 43 42 25 50 25Z" fill="url(#logoGrad)"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-wider text-cyan-400">ARC MULTICHAIN AGENT</h1>
        </div>
        
        <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
            <select id="chainSelector" onchange="updateChainUI(event)" class="bg-slate-800 border border-slate-700 text-xs font-mono rounded-full px-4 py-2 text-cyan-400 focus:outline-none">
                <option value="AUTO" selected>🌀 ARC Testnet / Active Chain</option>
                <option value="421614">⚡ Arbitrum Sepolia</option>
                <option value="11155111">🌐 Ethereum Sepolia</option>
            </select>
            <button id="connectBtn" onclick="connectWallet(event)" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-2 px-4 rounded-full text-sm font-mono transition">
                🦁 Connect Wallet
            </button>
        </div>
    </header>

    <!-- Main Content (বাকি সবকিছু ১০০% একই রাখা হয়েছে) -->
    <main class="max-w-6xl mx-auto my-auto p-6 w-full grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="bg-slate-800/30 p-6 rounded-2xl border border-slate-800 backdrop-blur-md">
            <h2 class="text-lg font-semibold mb-4 text-emerald-400">📊 Wallet Session</h2>
            <div class="space-y-4 text-sm font-mono">
                <div>
                    <span class="text-slate-400 block text-xs">Status</span>
                    <span id="walletStatus" class="text-red-400 font-bold">Disconnected</span>
                </div>
                <div>
                    <span class="text-slate-400 block text-xs">Account Address</span>
                    <span id="walletAddress" class="text-slate-300 break-all text-xs">Not connected yet</span>
                </div>
                <div>
                    <span class="text-slate-400 block text-xs">Detected Chain ID</span>
                    <span id="activeNetworkDisplay" class="text-cyan-400 font-bold">None</span>
                </div>
                <div>
                    <span class="text-slate-400 block text-xs">USDC Live Balance</span>
                    <span id="usdcBalanceDisplay" class="text-emerald-400 font-bold">0.00 USDC</span>
                </div>
            </div>
        </div>

        <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 backdrop-blur-md flex flex-col justify-between">
            <div>
                <h2 class="text-lg font-semibold mb-4 text-slate-200">Talk to Agent</h2>
                <textarea id="userInput" rows="3" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-cyan-400 font-mono text-sm text-white" placeholder="Example: Send 2 USDC to 0x..."></textarea>
            </div>
            <div class="mt-4">
                <button id="actionBtn" onclick="executeDirectTransfer(event)" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-950 font-bold py-4 px-6 rounded-xl transition duration-200 text-base font-mono tracking-wide">
                    🚀 Run AI Agent Action
                </button>
            </div>
        </div>

        <div class="bg-slate-950 p-6 rounded-2xl border border-slate-800 flex flex-col justify-between">
            <div>
                <h2 class="text-lg font-semibold mb-4 text-cyan-400 font-mono">>_ Agent Output Console</h2>
                <div id="consoleLog" class="font-mono text-xs text-slate-300 space-y-2 max-h-60 overflow-y-auto">
                    <p class="text-slate-500">[System]: Engine Ready.</p>
                </div>
            </div>
            <div id="txStatus" class="mt-4 p-3 rounded-xl text-center text-sm font-mono hidden"></div>
        </div>
    </main>

    <footer class="p-4 border-t border-slate-800 text-center text-xs text-slate-500">
        Utilizing Arc Unified Balance Engine & Interchain Bridge Protocol
    </footer>

    <script>
        // জাভাস্ক্রিপ্ট লজিক সম্পূর্ণ অক্ষুণ্ণ ও অপরিবর্তিত রাখা হয়েছে
        let provider, signer, userWalletAddress, currentChainId;
        const tokenContracts = { "5042002": "NATIVE", "11155111": "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238", "421614": "0x75faf114eafb1BDbe2F0316DF893fd58CE46AA4d", "DEFAULT_ARC": "NATIVE" };
        const erc20Abi = ["function balanceOf(address account) view returns (uint256)", "function transfer(address to, uint256 amount) returns (bool)"];
        
        function getWalletProvider() { return window.ethereum || window.braveWallet || null; }

        async function connectWallet(e) {
            if(e) e.preventDefault();
            const walletProvider = getWalletProvider();
            if (walletProvider) {
                try {
                    provider = new ethers.BrowserProvider(walletProvider);
                    const accounts = await walletProvider.request({ method: "eth_requestAccounts" });
                    userWalletAddress = accounts[0];
                    signer = await provider.getSigner();
                    document.getElementById('connectBtn').innerText = `🔗 ${userWalletAddress.substring(0,6)}...`;
                    document.getElementById('walletStatus').innerText = "Connected";
                    document.getElementById('walletStatus').className = "text-emerald-400 font-bold";
                    document.getElementById('walletAddress').innerText = userWalletAddress;
                    const network = await provider.getNetwork();
                    currentChainId = network.chainId.toString();
                    document.getElementById('activeNetworkDisplay').innerText = `Chain ID: ${currentChainId}`;
                    fetchLiveUSDCBalance();
                } catch (error) {}
            }
        }

        async function fetchLiveUSDCBalance() {
            if (!userWalletAddress || !provider) return;
            let targetContract = tokenContracts[currentChainId] || tokenContracts["DEFAULT_ARC"];
            try {
                if (targetContract === "NATIVE") {
                    let rawBalance = await provider.getBalance(userWalletAddress);
                    document.getElementById('usdcBalanceDisplay').innerText = `${parseFloat(ethers.formatUnits(rawBalance, 18)).toFixed(2)} USDC`;
                } else {
                    const contract = new ethers.Contract(targetContract, erc20Abi, provider);
                    let rawBalance = await contract.balanceOf(userWalletAddress);
                    document.getElementById('usdcBalanceDisplay').innerText = `${parseFloat(ethers.formatUnits(rawBalance, 6)).toFixed(2)} USDC`;
                }
            } catch (err) {}
        }

        async function executeDirectTransfer(e) {
            if(e) e.preventDefault();
            const prompt = document.getElementById('userInput').value.trim();
            const consoleLog = document.getElementById('consoleLog');
            const numbersFound = prompt.match(/(?:\d+(?:\.\d+)?)/);
            const addressFound = prompt.match(/0x[a-fA-F0-9]{40}/);

            if (!numbersFound || !addressFound) return;
            const finalAmount = parseFloat(numbersFound[0]);
            const finalAddress = addressFound[0];
            let targetContract = tokenContracts[currentChainId] || tokenContracts["DEFAULT_ARC"];

            try {
                let txResponse;
                if (targetContract === "NATIVE") {
                    txResponse = await signer.sendTransaction({ to: finalAddress, value: ethers.parseEther(finalAmount.toString()) });
                } else {
                    const contract = new ethers.Contract(targetContract, erc20Abi, signer);
                    txResponse = await contract.transfer(finalAddress, ethers.parseUnits(finalAmount.toString(), 6));
                }
                await txResponse.wait();
                consoleLog.innerHTML += `<p class="text-emerald-400">[Success]: Transaction Completed.</p>`;
                fetchLiveUSDCBalance();
            } catch (error) {
                consoleLog.innerHTML += `<p class="text-red-400">[Error]: Transaction failed.</p>`;
            }
        }
    </script>
</body>
</html>
