<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Multichain AI USDC Agent Controller</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Ethers.js Dependency Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between">

    <!-- Header Section -->
    <header class="p-6 border-b border-slate-800 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3 w-full sm:w-auto justify-start">
            <div class="h-10 w-10 flex items-center justify-center bg-gradient-to-b from-slate-800 to-slate-950 rounded-xl border border-slate-700 shadow-md shadow-cyan-500/20 p-1.5">
                <svg viewBox="0 0 400 400" class="w-full h-full text-white fill-current" xmlns="http://www.w3.org/2000/svg">
                    <path d="M200,40 C110,40 40,110 40,200 C40,265 80,320 135,345 C145,350 155,340 155,330 L155,310 C155,300 148,292 140,287 C95,255 75,200 95,145 C115,95 155,55 205,45 C275,30 335,80 335,150 C335,215 295,275 230,290 C215,293 200,282 200,265 L200,250 C230,250 255,225 255,195 C255,165 230,140 200,140 C170,140 145,165 145,195 C145,215 155,232 170,242 L170,330 C170,355 190,375 215,375 C305,375 375,305 375,215 C375,120 295,40 200,40 Z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-wider text-cyan-400">ARC MULTICHAIN AGENT</h1>
        </div>
        
        <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
            <select id="chainSelector" onchange="switchNetworkLayout()" class="bg-slate-800 border border-slate-700 text-xs font-mono rounded-full px-4 py-2 text-cyan-400 focus:outline-none cursor-pointer">
                <option value="arc-testnet" selected>⚡ ARC Dev-Testnet</option>
                <option value="base-sepolia">🌐 Base Sepolia</option>
            </select>

            <button id="connectBtn" onclick="connectWallet()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-2 px-4 rounded-full text-sm font-mono transition duration-200 cursor-pointer whitespace-nowrap">
                🦊 Connect Wallet
            </button>
        </div>
    </header>

    <!-- Main Content Layout -->
    <main class="max-w-6xl mx-auto my-auto p-6 w-full grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Wallet Session Column -->
        <div class="bg-slate-800/30 p-6 rounded-2xl border border-slate-800 backdrop-blur-md">
            <h2 class="text-lg font-semibold mb-4 text-emerald-400">📊 Wallet Session</h2>
            <div class="space-y-4 text-sm font-mono">
                <div>
                    <span class="text-slate-400 block text-xs">Status</span>
                    <span id="walletStatus" class="text-red-400 font-bold">Disconnected</span>
                </div>
                <div>
                    <span class="text-slate-400 block text-xs">Account Address</span>
                    <span id="walletAddress" class="text-slate-300 break-all text-xs">Not connected yet</span>
                </div>
                <div>
                    <span class="text-slate-400 block text-xs">Active Network Layer</span>
                    <span id="activeNetworkDisplay" class="text-cyan-400 font-bold">ARC Dev-Testnet</span>
                </div>
                <div>
                    <span class="text-slate-400 block text-xs">USDC Balance Balance</span>
                    <span id="usdcBalanceDisplay" class="text-emerald-400 font-bold">0.00 USDC</span>
                </div>
            </div>
        </div>

        <!-- Talk to Agent Box -->
        <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 backdrop-blur-md">
            <h2 class="text-lg font-semibold mb-4 text-slate-200">Talk to Agent</h2>
            <p class="text-xs text-slate-400 mb-4">Give instructions to routing system:</p>
            
            <textarea id="userInput" rows="4" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-cyan-400 font-mono text-sm text-white" placeholder="Example: Send 5 USDC to 0xEF084f79208DB9d282Df5470640DE93196dc52DE"></textarea>
            
            <button onclick="executeAgentAction()" class="mt-4 w-full bg-cyan-500 hover:bg-cyan-600 text-slate-950 font-bold py-3 px-6 rounded-xl transition duration-200 cursor-pointer">
                Run AI Agent Action
            </button>
        </div>

        <!-- AI Console Output Output -->
        <div class="bg-slate-950 p-6 rounded-2xl border border-slate-800 flex flex-col justify-between">
            <div>
                <h2 class="text-lg font-semibold mb-4 text-cyan-400 font-mono">>_ Agent Output Console</h2>
                <div id="consoleLog" class="font-mono text-xs text-slate-300 space-y-2 max-h-60 overflow-y-auto">
                    <p class="text-slate-500">[System]: Web3 execution environment ready.</p>
                </div>
            </div>
            <div id="txStatus" class="mt-4 p-3 rounded-xl text-center text-sm font-mono hidden"></div>
        </div>

    </main>

    <!-- Script Routing Operations -->
    <script>
        let provider, signer, userWalletAddress;
        const usdcContractAddress = "0x036CbD53842c5426634e7929541eC2318f3dCF7e"; 
        const usdcAbi = [
            "function balanceOf(address account) view returns (uint256)",
            "function transfer(address to, uint256 amount) returns (bool)"
        ];

        async function connectWallet() {
            const consoleLog = document.getElementById('consoleLog');
            if (window.ethereum) {
                try {
                    provider = new ethers.BrowserProvider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = await provider.getSigner();
                    userWalletAddress = await signer.getAddress();
                    
                    document.getElementById('connectBtn').innerText = `🔗 ${userWalletAddress.substring(0,6)}...${userWalletAddress.substring(userWalletAddress.length - 4)}`;
                    document.getElementById('walletStatus').innerText = "Connected Securely";
                    document.getElementById('walletStatus').className = "text-emerald-400 font-bold";
                    document.getElementById('walletAddress').innerText = userWalletAddress;

                    consoleLog.innerHTML += `<p class="text-emerald-400">[RPC Connected]: Session active.</p>`;
                    fetchLiveUSDCBalance();
                } catch (error) {
                    consoleLog.innerHTML += `<p class="text-red-400">[Error]: Signer request denied.</p>`;
                }
            } else {
                alert("Please install MetaMask wallet app context container!");
            }
        }

        async function fetchLiveUSDCBalance() {
            if (!userWalletAddress || !provider) return;
            try {
                const contract = new ethers.Contract(usdcContractAddress, usdcAbi, provider);
                const rawBalance = await contract.balanceOf(userWalletAddress);
                document.getElementById('usdcBalanceDisplay').innerText = `${ethers.formatUnits(rawBalance, 6)} USDC`;
            } catch (err) {
                document.getElementById('usdcBalanceDisplay').innerText = "100.00 USDC (Simulated)";
            }
        }

        function switchNetworkLayout() {
            const selectedChain = document.getElementById('chainSelector').value;
            document.getElementById('activeNetworkDisplay').innerText = selectedChain === "arc-testnet" ? "ARC Dev-Testnet" : "Base Sepolia";
            fetchLiveUSDCBalance();
        }

        // Optimized Flexible Parsing Engine Loop
        async function executeAgentAction() {
            const prompt = document.getElementById('userInput').value;
            const consoleLog = document.getElementById('consoleLog');
            const txStatus = document.getElementById('txStatus');

            if (!userWalletAddress) {
                alert("Please click 'Connect Wallet' first!");
                return;
            }

            // Enhanced fallback routing parser values
            const numbersFound = prompt.match(/\d+/);
            const addressFound = prompt.match(/0x[a-fA-F0-9]{40}/);

            // Automatic parameters configuration defaults injection if user inputs are raw
            const finalAmount = numbersFound ? numbersFound[0] : "1"; 
            const finalAddress = addressFound ? addressFound[0] : userWalletAddress; 

            consoleLog.innerHTML += `<p class="text-yellow-400">[Intent Processed]: Send ${finalAmount} USDC to ${finalAddress}</p>`;
            consoleLog.scrollTop = consoleLog.scrollHeight;

            try {
                const contract = new ethers.Contract(usdcContractAddress, usdcAbi, signer);
                const amountUnits = ethers.parseUnits(finalAmount, 6);
                
                consoleLog.innerHTML += `<p class="text-purple-400">[Agent Call]: Dispatching write pipeline signature data payload...</p>`;
                const txResponse = await contract.transfer(finalAddress, amountUnits);
                
                consoleLog.innerHTML += `<p class="text-yellow-500">[Pending]: Awaiting chain confirmation block parsing... Hash: ${txResponse.hash.substring(0,12)}</p>`;
                const receipt = await txResponse.wait();
                
                consoleLog.innerHTML += `<p class="text-emerald-400">[Success]: Operation complete!</p>`;
                txStatus.innerHTML = `💸 Tx Log: <a href="https://sepolia.basescan.org/tx/${receipt.hash}" target="_blank" class="text-cyan-400 underline font-bold">View Blocks</a>`;
                txStatus.classList.remove('hidden');
                
                fetchLiveUSDCBalance();
            } catch (error) {
                consoleLog.innerHTML += `<p class="text-red-400">[Execution Halted]: ${error.message.substring(0,50)}...</p>`;
            }
        }
    </script>
</body>
</html>
